# SonarCloud Configuration for academic-spl (Python/FastAPI)
# Este archivo le indica a SonarCloud cómo analizar el proyecto

sonar.projectKey=StevenISMAEL_academic-spl
sonar.organization=stevenismael
sonar.projectName=Academic SPL

# Directorios a analizar
sonar.sources=core_assets
sonar.tests=tests_core

# Exclusiones
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/*.pyc

# Cobertura de código (generada por pytest-cov en el pipeline)
sonar.python.coverage.reportPaths=coverage.xml

# Versión de Python
sonar.python.version=3.11
