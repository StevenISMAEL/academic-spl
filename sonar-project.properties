# SonarCloud Configuration for academic-spl (Python/FastAPI + Laravel/PHP)
# Este archivo le indica a SonarCloud cómo analizar el proyecto multi-lenguaje.

sonar.projectKey=StevenISMAEL_academic-spl
sonar.organization=stevenismael
sonar.projectName=Academic SPL

# ─── Fuentes y tests ────────────────────────────────────────────────────────────
# SonarCloud analiza todo lo que esté dentro de core_assets/
sonar.sources=core_assets
sonar.tests=tests_core

# ─── Exclusiones ─────────────────────────────────────────────────────────────────
# Archivos que no deben ser analizados (dependencias, cache, compilados)
sonar.exclusions=\
  **/__pycache__/**,\
  **/.venv/**,\
  **/venv/**,\
  **/*.pyc,\
  **/vendor/**,\
  **/node_modules/**,\
  **/*.min.js,\
  **/public/build/**,\
  **/storage/framework/views/**

# Excluir directorios de tests del análisis de producción
sonar.test.exclusions=**/tests/**,**/tests_core/**

# ─── Cobertura Python (pytest-cov → coverage.xml) ───────────────────────────────
sonar.python.coverage.reportPaths=coverage.xml

# ─── Cobertura PHP (PHPUnit → clover.xml) ────────────────────────────────────────
# Generado por: vendor/bin/phpunit --coverage-clover clover.xml
# Ruta relativa a la raíz del proyecto (donde corre SonarCloud)
sonar.php.coverage.reportPaths=core_assets/frontend/laravel-shell/clover.xml

# ─── Versiones de lenguaje ───────────────────────────────────────────────────────
sonar.python.version=3.11
