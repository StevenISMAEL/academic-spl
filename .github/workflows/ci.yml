name: CI/CD Pipeline - Academic SPL (GCP & GKE)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ===========================================================================
  # JOB 1: BUILD, TEST & SAST
  # Equivalente al build-and-test de PetClinic, adaptado a Python/FastAPI
  # ===========================================================================
  build-and-test:
    name: Build, Test & SAST
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # --- PASO DEVSECOPS: ESCANEO DE SECRETOS ---
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ─── PYTHON: Setup + Tests + Coverage ────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --no-cache-dir -r requirements.txt
        python -m pip install --no-cache-dir python-jose[cryptography]==3.4.0 passlib[bcrypt]==1.7.4 bcrypt==4.1.2 pytest pytest-cov

    - name: Run Unit Tests (Core Assets) with Coverage
      run: |
        python -m pytest \
          --cov=core_assets \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing

    - name: Confirm Python coverage artifact exists
      run: |
        test -f coverage.xml
        ls -l coverage.xml

    # ─── PHP: Setup + Tests + Coverage ───────────────────────────────────────────
    - name: Set up PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo_sqlite, sqlite3
        coverage: xdebug
        tools: composer

    - name: Install PHP dependencies (Composer)
      run: |
        mkdir -p core_assets/frontend/laravel-shell/storage/framework/views
        composer install \
          --no-interaction \
          --prefer-dist \
          --working-dir=core_assets/frontend/laravel-shell

    - name: Create Laravel .env for Testing
      working-directory: core_assets/frontend/laravel-shell
      run: |
        echo "APP_KEY=${{ secrets.LARAVEL_APP_KEY }}" > .env
        echo "APP_ENV=testing" >> .env
        echo "APP_DEBUG=true" >> .env

    - name: Run PHPUnit with Clover Coverage
      run: |
        cd core_assets/frontend/laravel-shell
        vendor/bin/phpunit --coverage-clover clover.xml
        test -f clover.xml
        ls -l clover.xml
      env:
        XDEBUG_MODE: coverage

    - name: Verify coverage artifacts exist
      run: |
        test -f coverage.xml
        test -f core_assets/frontend/laravel-shell/clover.xml
        ls -l coverage.xml core_assets/frontend/laravel-shell/clover.xml

    - name: Upload coverage artifacts for SonarCloud
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          coverage.xml
          core_assets/frontend/laravel-shell/clover.xml

    - name: Clear Laravel view cache before SonarCloud
      run: |
        cd core_assets/frontend/laravel-shell
        php artisan view:clear || rm -rf storage/framework/views/*.php

    # --- PASO DEVSECOPS: ANÁLISIS ESTÁTICO DE CALIDAD ---
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=StevenISMAEL_academic-spl
          -Dsonar.organization=stevenismael
          -Dsonar.sources=core_assets/backend/core_engine,core_assets/frontend/laravel-shell/app
          -Dsonar.tests=tests_core,core_assets/frontend/laravel-shell/tests
          -Dsonar.test.inclusions=**/test_*.py,**/*Test.php
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.php.coverage.reportPaths=core_assets/frontend/laravel-shell/clover.xml
          -Dsonar.exclusions=**/__pycache__/**,**/.venv/**,**/*.pyc,**/vendor/**,**/node_modules/**,**/public/build/**
          -Dsonar.coverage.exclusions=**/resources/views/**,**/*.blade.php,**/config/**,**/bootstrap/**,**/routes/**,**/database/migrations/**,**/database/seeders/**,**/database/factories/**,**/public/index.php,**/*Test.php,**/tests/**
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300


  # ===========================================================================
  # JOB 2: CONTAINERIZE & SECURITY SCAN
  # Construye y escanea la imagen Docker de cada producto del SPL
  # ===========================================================================
  docker-build:
    name: Containerize & Security Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # Lista de productos derivados disponibles en el repositorio.
        # Añadir una entrada aquí por cada producto generado con workbench.py.
        product:
          - name: utn
            dir: derived_products/utn
            config_path: derived_products/utn/backend/product_config.yaml
          - name: utn2
            dir: derived_products/utn2
            config_path: derived_products/utn2/backend/product_config.yaml
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Preparar el Dockerfile real desde la plantilla parametrizada
    - name: Prepare Dockerfile for ${{ matrix.product.name }}
      run: |
        set -euo pipefail
        cp docker/templates/backend.Dockerfile.tpl Dockerfile.${{ matrix.product.name }}
        echo "--- Dockerfile backend generado para ${{ matrix.product.name }} ---"
        head -5 Dockerfile.${{ matrix.product.name }}

    # --- PASO DEVSECOPS: ESCANEO DE VULNERABILIDADES (TRIVY) ---
    - name: Build local image for security scan (${{ matrix.product.name }})
      run: |
        docker build \
          --build-arg PRODUCT_CONFIG_PATH=${{ matrix.product.config_path }} \
          --build-arg PRODUCT_NAME=${{ matrix.product.name }} \
          --build-arg PRODUCT_DIR=${{ matrix.product.dir }} \
          -f Dockerfile.${{ matrix.product.name }} \
          -t academic-spl/${{ matrix.product.name }}:test .

    - name: Run Trivy Vulnerability Scanner (${{ matrix.product.name }})
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'academic-spl/${{ matrix.product.name }}:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL'

    - name: Convert repository name to lowercase
      run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Backend Image to GHCR (${{ matrix.product.name }})
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.${{ matrix.product.name }}
        push: true
        build-args: |
          PRODUCT_CONFIG_PATH=${{ matrix.product.config_path }}
          PRODUCT_NAME=${{ matrix.product.name }}
          PRODUCT_DIR=${{ matrix.product.dir }}
        tags: |
          ghcr.io/${{ env.REPO_LC }}/${{ matrix.product.name }}-backend:latest
          ghcr.io/${{ env.REPO_LC }}/${{ matrix.product.name }}-backend:${{ github.sha }}

    # ── FRONTEND: Build + Trivy + Push ──────────────────────────────────────────
    # El frontend (Laravel) es compartido — se construye una sola vez por producto
    # y se configura en runtime con la URL del backend via variables de entorno.
    - name: Build Frontend image for security scan (${{ matrix.product.name }})
      run: |
        docker build \
          -f docker/templates/frontend.Dockerfile.tpl \
          -t academic-spl/${{ matrix.product.name }}-frontend:test .

    - name: Run Trivy on Frontend (${{ matrix.product.name }})
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'academic-spl/${{ matrix.product.name }}-frontend:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL'

    - name: Push Frontend Image to GHCR (${{ matrix.product.name }})
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/templates/frontend.Dockerfile.tpl
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LC }}/${{ matrix.product.name }}-frontend:latest
          ghcr.io/${{ env.REPO_LC }}/${{ matrix.product.name }}-frontend:${{ github.sha }}

  # ===========================================================================
  # JOB 3: TERRAFORM — APROVISIONAR INFRAESTRUCTURA EN GCP
  # Idéntico al de PetClinic, solo cambia el estado remoto y variables
  # ===========================================================================
  terraform-deploy:
    name: Provision Infrastructure (Terraform)
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: ./terraform
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format & Validate
      run: |
        terraform fmt -check
        terraform validate

    - name: Terraform Apply
      run: terraform apply -auto-approve

  # ===========================================================================
  # JOB 4: CD — DESPLIEGUE A STAGING (AUTOMÁTICO)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging Environment
    needs: terraform-deploy
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: gke-academic-spl
        location: us-central1-a
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy Backend + Frontend por producto (Staging)
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}
        REPO_LC: ${{ github.repository }}
      run: |
        SQL_IP=$(gcloud sql instances describe academic-spl-postgres \
          --format='value(ipAddresses[0].ipAddress)' \
          --project=${{ secrets.GCP_PROJECT_ID }})
        echo "Cloud SQL IP: ${SQL_IP}"

        REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')

        # Iterar sobre cada producto derivado registrado
        for PRODUCT in utn utn2; do
          echo ""
          echo "======================================================"
          echo "  Desplegando producto: ${PRODUCT} → namespace: staging-${PRODUCT}"
          echo "======================================================"

          NS="staging-${PRODUCT}"

          # 1. Crear namespace del producto
          kubectl create namespace ${NS} --dry-run=client -o yaml | kubectl apply -f -
          sleep 3

          # 2. Desplegar SECRET del backend (Cloud SQL)
          sed "s|CLOUD_SQL_IP|${SQL_IP}|g; s|DB_PASSWORD_PLACEHOLDER|${DB_PASSWORD}|g" \
            k8s/db-secret.yaml \
            | sed "s|namespace: academic-spl|namespace: ${NS}|g" \
            | kubectl apply -f -

          # 3. Desplegar CONFIGMAP del backend
          sed "s|namespace: academic-spl|namespace: ${NS}|g" \
            k8s/configmap.yaml | kubectl apply -f -

          # 4. Desplegar BACKEND (Deployment + Service + HPA)
          sed "s|namespace: academic-spl|namespace: ${NS}|g; \
               s|image: .*|image: ghcr.io/${REPO_LC}/${PRODUCT}-backend:latest|g; \
               s|name: academic-spl-deployment|name: ${PRODUCT}-backend-deployment|g; \
               s|name: academic-spl-service|name: ${PRODUCT}-backend-service|g; \
               s|app: academic-spl|app: ${PRODUCT}-backend|g" \
            k8s/deployment.yaml | kubectl apply -f -

          sed "s|namespace: academic-spl|namespace: ${NS}|g; \
               s|app: academic-spl|app: ${PRODUCT}-backend|g; \
               s|name: academic-spl-service|name: ${PRODUCT}-backend-service|g" \
            k8s/service.yml | kubectl apply -f -

          # 5. Desplegar CONFIGMAP del frontend (con URL interna del backend)
          BACKEND_SVC="http://${PRODUCT}-backend-service.${NS}.svc.cluster.local"
          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-configmap.yaml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | sed "s|PRODUCT_DISPLAY_NAME|${PRODUCT}|g" \
            | sed "s|BACKEND_URL:.*|BACKEND_URL: \"${BACKEND_SVC}\"|g" \
            | sed "s|FRONTEND_EXTERNAL_IP|pending|g" \
            | kubectl apply -f -

          # 6. Desplegar SECRET del frontend (APP_KEY de Laravel)
          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-secret.yaml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | sed "s|LARAVEL_APP_KEY_PLACEHOLDER|${LARAVEL_APP_KEY}|g" \
            | kubectl apply -f -

          # 7. Desplegar FRONTEND Deployment
          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-deployment.yaml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | sed "s|image: .*frontend:latest|image: ghcr.io/${REPO_LC}/${PRODUCT}-frontend:latest|g" \
            | kubectl apply -f -

          # 8. Desplegar FRONTEND Service
          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-service.yml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | kubectl apply -f -

          echo "  ✓ ${PRODUCT}: Backend y Frontend desplegados en namespace ${NS}"
        done

        echo ""
        echo "✅ Todos los productos desplegados. Reiniciando pods..."
        for PRODUCT in utn utn2; do
          NS="staging-${PRODUCT}"
          kubectl rollout restart deployment ${PRODUCT}-backend-deployment  -n ${NS} || true
          kubectl rollout restart deployment ${PRODUCT}-frontend-deployment -n ${NS} || true
        done

    - name: Deploy Observability Stack
      continue-on-error: true
      run: |
        kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -

        # PASO 1: Instalar kube-prometheus-stack PRIMERO
        # Esto registra los CRDs: PrometheusRule, ServiceMonitor, etc.
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
          --namespace observability \
          --create-namespace \
          --values monitoring/prometheus-values.yaml \
          --timeout 8m

        # PASO 2: Esperar a que los CRDs estén disponibles
        echo "Esperando a que los CRDs de Prometheus Operator estén listos..."
        kubectl wait --for condition=established --timeout=60s \
          crd/prometheusrules.monitoring.coreos.com \
          crd/servicemonitors.monitoring.coreos.com || true

        # PASO 3: Aplicar recursos custom DESPUÉS de que los CRDs existan
        kubectl apply -f monitoring/grafana-slo-dashboard.yaml
        kubectl apply -f monitoring/alert-rules.yaml
        kubectl apply -f monitoring/prometheus-service-monitor.yaml

  # ===========================================================================
  # JOB 5: DAST — ESCANEO DINÁMICO EN STAGING (OWASP ZAP)
  # ===========================================================================
  dast-scan:
    name: OWASP ZAP Security Scan (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      issues: write
    steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: gke-academic-spl
        location: us-central1-a
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Retrieve Staging IP
      timeout-minutes: 10
      run: |
        echo "Esperando a que GCP asigne la IP pública a Staging..."
        STAGING_IP=""
        ATTEMPTS=0
        while [ -z "$STAGING_IP" ] && [ $ATTEMPTS -lt 30 ]; do
          sleep 10
          STAGING_IP=$(kubectl get svc staging-service -n staging \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ATTEMPTS=$((ATTEMPTS+1))
        done

        if [ -z "$STAGING_IP" ]; then
          echo "ERROR: No se pudo obtener la IP después de 5 minutos"
          exit 1
        fi
        echo "IP de Staging encontrada: $STAGING_IP"

        echo "Esperando a que la aplicación responda..."
        ATTEMPTS=0
        while [ $ATTEMPTS -lt 30 ]; do
          HTTP_CODE=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
            http://$STAGING_IP/ || echo "000")
          echo "Intento $ATTEMPTS - HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "¡Aplicación lista! (HTTP $HTTP_CODE)"
            break
          fi
          sleep 10
          ATTEMPTS=$((ATTEMPTS+1))
        done

        if [ $ATTEMPTS -ge 30 ]; then
          echo "WARNING: La app no respondió después de 5 minutos, continuando..."
        fi
        echo "TARGET_URL=http://$STAGING_IP" >> $GITHUB_ENV

    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: ${{ env.TARGET_URL }}
        fail_action: false

  # ===========================================================================
  # JOB 6: CD — DESPLIEGUE A PRODUCCIÓN (REQUIERE APROBACIÓN MANUAL)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production Environment
    needs: dast-scan
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: gke-academic-spl
        location: us-central1-a
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy Backend + Frontend por producto (Producción)
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}
      run: |
        SQL_IP=$(gcloud sql instances describe academic-spl-postgres \
          --format='value(ipAddresses[0].ipAddress)' \
          --project=${{ secrets.GCP_PROJECT_ID }})
        echo "Cloud SQL IP: ${SQL_IP}"

        REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')

        for PRODUCT in utn utn2; do
          echo ""
          echo "======================================================"
          echo "  Producción: ${PRODUCT} → namespace: ${PRODUCT}"
          echo "======================================================"

          NS="${PRODUCT}"

          kubectl create namespace ${NS} --dry-run=client -o yaml | kubectl apply -f -
          sleep 3

          # Backend: secret + configmap + deployment + service + hpa
          sed "s|CLOUD_SQL_IP|${SQL_IP}|g; s|DB_PASSWORD_PLACEHOLDER|${DB_PASSWORD}|g" \
            k8s/db-secret.yaml \
            | sed "s|namespace: academic-spl|namespace: ${NS}|g" \
            | kubectl apply -f -

          sed "s|namespace: academic-spl|namespace: ${NS}|g" \
            k8s/configmap.yaml | kubectl apply -f -

          sed "s|namespace: academic-spl|namespace: ${NS}|g; \
               s|image: .*|image: ghcr.io/${REPO_LC}/${PRODUCT}-backend:latest|g; \
               s|name: academic-spl-deployment|name: ${PRODUCT}-backend-deployment|g; \
               s|name: academic-spl-service|name: ${PRODUCT}-backend-service|g; \
               s|app: academic-spl|app: ${PRODUCT}-backend|g" \
            k8s/deployment.yaml | kubectl apply -f -

          sed "s|namespace: academic-spl|namespace: ${NS}|g; \
               s|app: academic-spl|app: ${PRODUCT}-backend|g; \
               s|name: academic-spl-service|name: ${PRODUCT}-backend-service|g" \
            k8s/service.yml | kubectl apply -f -

          sed "s|namespace: academic-spl|namespace: ${NS}|g; \
               s|name: academic-spl-hpa|name: ${PRODUCT}-hpa|g; \
               s|name: academic-spl-deployment|name: ${PRODUCT}-backend-deployment|g" \
            k8s/hpa.yml | kubectl apply -f -

          # Frontend: configmap + secret + deployment + service
          BACKEND_SVC="http://${PRODUCT}-backend-service.${NS}.svc.cluster.local"

          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-configmap.yaml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | sed "s|BACKEND_URL:.*|BACKEND_URL: \"${BACKEND_SVC}\"|g" \
            | sed "s|FRONTEND_EXTERNAL_IP|pending|g" \
            | kubectl apply -f -

          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-secret.yaml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | sed "s|LARAVEL_APP_KEY_PLACEHOLDER|${LARAVEL_APP_KEY}|g" \
            | kubectl apply -f -

          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-deployment.yaml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | sed "s|image: .*frontend:latest|image: ghcr.io/${REPO_LC}/${PRODUCT}-frontend:latest|g" \
            | kubectl apply -f -

          sed "s|namespace: PRODUCT_NAME|namespace: ${NS}|g" k8s/frontend-service.yml \
            | sed "s|PRODUCT_NAME|${PRODUCT}|g" \
            | kubectl apply -f -

          echo "  ✓ ${PRODUCT}: desplegado en producción (namespace ${NS})"
        done

        echo ""
        echo "✅ Producción actualizada. Reiniciando pods..."
        for PRODUCT in utn utn2; do
          kubectl rollout restart deployment ${PRODUCT}-backend-deployment  -n ${PRODUCT} || true
          kubectl rollout restart deployment ${PRODUCT}-frontend-deployment -n ${PRODUCT} || true
        done
