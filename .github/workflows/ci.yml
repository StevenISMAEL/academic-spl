name: CI/CD Pipeline - Academic SPL (GCP & GKE)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ===========================================================================
  # JOB 1: BUILD, TEST & SAST
  # Equivalente al build-and-test de PetClinic, adaptado a Python/FastAPI
  # ===========================================================================
  build-and-test:
    name: Build, Test & SAST
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # --- PASO DEVSECOPS: ESCANEO DE SECRETOS ---
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ─── PYTHON: Setup + Tests + Coverage ────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --no-cache-dir -r requirements.txt
        python -m pip install --no-cache-dir python-jose[cryptography]==3.4.0 passlib[bcrypt]==1.7.4 bcrypt==4.1.2 pytest pytest-cov

    - name: Run Unit Tests (Core Assets) with Coverage
      run: |
        python -m pytest \
          --cov=core_assets \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing

    - name: Confirm Python coverage artifact exists
      run: |
        test -f coverage.xml
        ls -l coverage.xml

    # ─── PHP: Setup + Tests + Coverage ───────────────────────────────────────────
    - name: Set up PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo_sqlite, sqlite3
        coverage: xdebug
        tools: composer

    - name: Install PHP dependencies (Composer)
      run: |
        mkdir -p core_assets/frontend/laravel-shell/storage/framework/views
        composer install \
          --no-interaction \
          --prefer-dist \
          --working-dir=core_assets/frontend/laravel-shell

    - name: Create Laravel .env for Testing
      working-directory: core_assets/frontend/laravel-shell
      run: |
        echo "APP_KEY=${{ secrets.LARAVEL_APP_KEY }}" > .env
        echo "APP_ENV=testing" >> .env
        echo "APP_DEBUG=true" >> .env

    - name: Run PHPUnit with Clover Coverage
      run: |
        cd core_assets/frontend/laravel-shell
        vendor/bin/phpunit --coverage-clover clover.xml
        test -f clover.xml
        ls -l clover.xml
      env:
        XDEBUG_MODE: coverage

    - name: Verify coverage artifacts exist
      run: |
        test -f coverage.xml
        test -f core_assets/frontend/laravel-shell/clover.xml
        ls -l coverage.xml core_assets/frontend/laravel-shell/clover.xml

    - name: Upload coverage artifacts for SonarCloud
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          coverage.xml
          core_assets/frontend/laravel-shell/clover.xml

    - name: Clear Laravel view cache before SonarCloud
      run: |
        cd core_assets/frontend/laravel-shell
        php artisan view:clear || rm -rf storage/framework/views/*.php

    # --- PASO DEVSECOPS: ANÁLISIS ESTÁTICO DE CALIDAD ---
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=StevenISMAEL_academic-spl
          -Dsonar.organization=stevenismael
          -Dsonar.sources=core_assets/backend/core_engine,core_assets/frontend/laravel-shell/app
          -Dsonar.tests=tests_core,core_assets/frontend/laravel-shell/tests
          -Dsonar.test.inclusions=**/test_*.py,**/*Test.php
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.php.coverage.reportPaths=core_assets/frontend/laravel-shell/clover.xml
          -Dsonar.exclusions=**/__pycache__/**,**/.venv/**,**/*.pyc,**/vendor/**,**/node_modules/**,**/public/build/**
          -Dsonar.coverage.exclusions=**/resources/views/**,**/*.blade.php,**/config/**,**/bootstrap/**,**/routes/**,**/database/migrations/**,**/database/seeders/**,**/database/factories/**,**/public/index.php,**/*Test.php,**/tests/**
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300


  # ===========================================================================
  # JOB 2: CONTAINERIZE & SECURITY SCAN
  # Construye y escanea la imagen Docker de cada producto del SPL
  # ===========================================================================
  docker-build:
    name: Containerize & Security Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # Lista de productos disponibles en el repositorio actual
        product:
          - name: colegio-basico
            config_path: tests_core/fixtures/colegio-basico/product_config.yaml
          - name: universidad-compleja
            config_path: tests_core/fixtures/universidad-compleja/product_config.yaml
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Preparar el Dockerfile real desde la plantilla parametrizada
    - name: Prepare Dockerfile for ${{ matrix.product.name }}
      run: |
        set -euo pipefail
        pwd
        ls -la
        ls -la docker/templates
        test -f docker/templates/backend.Dockerfile.tpl
        cp docker/templates/backend.Dockerfile.tpl Dockerfile.${{ matrix.product.name }}

    # --- PASO DEVSECOPS: ESCANEO DE VULNERABILIDADES (TRIVY) ---
    - name: Build local image for security scan (${{ matrix.product.name }})
      run: |
        docker build \
          --build-arg PRODUCT_CONFIG_PATH=${{ matrix.product.config_path }} \
          --build-arg PRODUCT_NAME=${{ matrix.product.name }} \
          -f Dockerfile.${{ matrix.product.name }} \
          -t academic-spl/${{ matrix.product.name }}:test .

    - name: Run Trivy Vulnerability Scanner (${{ matrix.product.name }})
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'academic-spl/${{ matrix.product.name }}:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL'

    - name: Convert repository name to lowercase
      run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Image to GHCR (${{ matrix.product.name }})
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.${{ matrix.product.name }}
        push: true
        build-args: |
          PRODUCT_CONFIG_PATH=${{ matrix.product.config_path }}
          PRODUCT_NAME=${{ matrix.product.name }}
        tags: |
          ghcr.io/${{ env.REPO_LC }}/${{ matrix.product.name }}:latest
          ghcr.io/${{ env.REPO_LC }}/${{ matrix.product.name }}:${{ github.sha }}

  # ===========================================================================
  # JOB 3: TERRAFORM — APROVISIONAR INFRAESTRUCTURA EN GCP
  # Idéntico al de PetClinic, solo cambia el estado remoto y variables
  # ===========================================================================
  terraform-deploy:
    name: Provision Infrastructure (Terraform)
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: ./terraform
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format & Validate
      run: |
        terraform fmt -check
        terraform validate

    - name: Terraform Apply
      run: terraform apply -auto-approve

  # ===========================================================================
  # JOB 4: CD — DESPLIEGUE A STAGING (AUTOMÁTICO)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging Environment
    needs: terraform-deploy
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: gke-academic-spl
        location: us-central1-a
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy to Kubernetes (Staging)
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        echo "Obteniendo IP de Cloud SQL..."
        SQL_IP=$(gcloud sql instances describe academic-spl-postgres \
          --format='value(ipAddresses[0].ipAddress)' \
          --project=${{ secrets.GCP_PROJECT_ID }})
        echo "Cloud SQL IP: ${SQL_IP}"

        echo "Modificando YAMLs para apuntar a Staging..."
        sed -i 's/academic-spl/staging/g' k8s/*.yaml k8s/*.yml

        echo "Inyectando IP de Cloud SQL y contraseña en el secret..."
        sed -i "s|CLOUD_SQL_IP|${SQL_IP}|g" k8s/db-secret.yaml
        sed -i "s|DB_PASSWORD_PLACEHOLDER|${DB_PASSWORD}|g" k8s/db-secret.yaml

        kubectl apply -f k8s/namespace.yaml
        sleep 5
        kubectl apply -f k8s/db-secret.yaml
        kubectl apply -f k8s/

        echo "Forzando actualización de los pods con la nueva imagen..."
        kubectl rollout restart deployment academic-spl-deployment -n staging

    - name: Deploy Observability Stack
      continue-on-error: true
      run: |
        kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f monitoring/grafana-slo-dashboard.yaml
        kubectl apply -f monitoring/alert-rules.yaml
        kubectl apply -f monitoring/prometheus-service-monitor.yaml
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
          --namespace observability \
          --create-namespace \
          --values monitoring/prometheus-values.yaml \
          --timeout 8m

  # ===========================================================================
  # JOB 5: DAST — ESCANEO DINÁMICO EN STAGING (OWASP ZAP)
  # ===========================================================================
  dast-scan:
    name: OWASP ZAP Security Scan (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      issues: write
    steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: gke-academic-spl
        location: us-central1-a
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Retrieve Staging IP
      timeout-minutes: 10
      run: |
        echo "Esperando a que GCP asigne la IP pública a Staging..."
        STAGING_IP=""
        ATTEMPTS=0
        while [ -z "$STAGING_IP" ] && [ $ATTEMPTS -lt 30 ]; do
          sleep 10
          STAGING_IP=$(kubectl get svc academic-spl-service -n staging \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ATTEMPTS=$((ATTEMPTS+1))
        done

        if [ -z "$STAGING_IP" ]; then
          echo "ERROR: No se pudo obtener la IP después de 5 minutos"
          exit 1
        fi
        echo "IP de Staging encontrada: $STAGING_IP"

        echo "Esperando a que la aplicación responda..."
        ATTEMPTS=0
        while [ $ATTEMPTS -lt 30 ]; do
          HTTP_CODE=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
            http://$STAGING_IP/ || echo "000")
          echo "Intento $ATTEMPTS - HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "¡Aplicación lista! (HTTP $HTTP_CODE)"
            break
          fi
          sleep 10
          ATTEMPTS=$((ATTEMPTS+1))
        done

        if [ $ATTEMPTS -ge 30 ]; then
          echo "WARNING: La app no respondió después de 5 minutos, continuando..."
        fi
        echo "TARGET_URL=http://$STAGING_IP" >> $GITHUB_ENV

    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: ${{ env.TARGET_URL }}
        fail_action: false

  # ===========================================================================
  # JOB 6: CD — DESPLIEGUE A PRODUCCIÓN (REQUIERE APROBACIÓN MANUAL)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production Environment
    needs: dast-scan
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: gke-academic-spl
        location: us-central1-a
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy to Kubernetes (Production)
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        echo "Obteniendo IP de Cloud SQL..."
        SQL_IP=$(gcloud sql instances describe academic-spl-postgres \
          --format='value(ipAddresses[0].ipAddress)' \
          --project=${{ secrets.GCP_PROJECT_ID }})

        echo "Inyectando IP de Cloud SQL y contraseña en el secret..."
        sed -i "s|CLOUD_SQL_IP|${SQL_IP}|g" k8s/db-secret.yaml
        sed -i "s|DB_PASSWORD_PLACEHOLDER|${DB_PASSWORD}|g" k8s/db-secret.yaml

        echo "Desplegando en Producción (academic-spl)..."
        kubectl apply -f k8s/namespace.yaml
        sleep 5
        kubectl apply -f k8s/db-secret.yaml
        kubectl apply -f k8s/

        echo "Forzando actualización de los pods con la nueva imagen..."
        kubectl rollout restart deployment academic-spl-deployment -n academic-spl
