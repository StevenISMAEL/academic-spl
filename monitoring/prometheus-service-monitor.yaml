# =============================================================================
# ServiceMonitor — Scrape de métricas de FastAPI (academic-spl)
# =============================================================================
# FastAPI expone /metrics con prometheus-fastapi-instrumentator.
# Este ServiceMonitor descubre TODOS los backends de la SPL dinámicamente
# usando un label selector genérico (tier: backend) en lugar de hardcodear
# namespaces o nombres de producto.
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: academic-spl-monitor
  namespace: observability
  labels:
    app: academic-spl
    release: prometheus
spec:
  # Buscar Services en CUALQUIER namespace (dinámico para nuevos productos)
  namespaceSelector:
    any: true

  # Seleccionar Services que tengan el label "tier: backend"
  # (aplicado por el pipeline via sed a todos los backend services)
  selector:
    matchExpressions:
      - key: app
        operator: Exists

  # Configuración de scraping
  endpoints:
    - port: http
      path: /metrics          # FastAPI expone en /metrics
      interval: 15s
      scrapeTimeout: 10s
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
