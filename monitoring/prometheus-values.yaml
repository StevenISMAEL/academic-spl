# =============================================================================
# kube-prometheus-stack — Configuración ligera para academic-spl (2 nodos GKE)
# Basado en el prometheus-values.yaml de PetClinic_Project
# =============================================================================

# --- Grafana ---
grafana:
  enabled: true
  adminPassword: "AcademicSPL2026!"
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"
      serve_from_sub_path: false
    security:
      cookie_secure: false
      allow_embedding: true
    auth:
      disable_login_form: false
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
    datasources:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'custom'
          orgId: 1
          folder: 'Academic SPL'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/custom
  dashboardsConfigMaps:
    custom: "academic-spl-slo-dashboard"

# --- Prometheus Server ---
prometheus:
  prometheusSpec:
    retention: 12h
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        cpu: 300m
        memory: 400Mi
    # Necesario para que Prometheus descubra ServiceMonitors de otros namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# --- Alertmanager ---
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: 'default'
    receivers:
      - name: 'default'
        # Configura tu webhook de Teams/Slack aquí cuando lo tengas
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

# --- Node Exporter ---
nodeExporter:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# --- Kube State Metrics ---
kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# --- Prometheus Operator ---
prometheusOperator:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  admissionWebhooks:
    patch:
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
