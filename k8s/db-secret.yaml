apiVersion: v1
kind: Secret
metadata:
  name: academic-spl-db-secret
  namespace: academic-spl
type: Opaque
stringData:
  # El pipeline CI/CD reemplaza CLOUD_SQL_IP y DB_PASSWORD_PLACEHOLDER
  # antes de aplicar este secret (ver job deploy-staging en ci.yml)
  DATABASE_URL: "postgresql://DB_USER:DB_PASSWORD_PLACEHOLDER@CLOUD_SQL_IP:5432/academic_spl"
  DB_USER: "academicsqladmin"
  DB_PASSWORD: "DB_PASSWORD_PLACEHOLDER"
