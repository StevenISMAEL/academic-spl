# products/colegio-basico/product_config.yaml
#
# Producto derivado: Instituto Basico Demo (Colegio)
# Derivado de la Linea de Productos Academica sin modificar el Core.

metadata:
  product_name: "Colegio Basico Demo"
  product_type: "k12"

features:
  attendance: true      # Colegio controla asistencia diaria
  grading: true         # Calificaciones con escala literal
  enrollment: true      # Matricula anual
  schedule: false       # Horario integrado — no se gestiona aqui
  reports: false        # Reportes los emite el MINEDUC directamente
  certificates: false   # Los certificados los emite el rectorado en papel

academic_settings:
  evaluation_scale: "literal"       # Sobresaliente / Muy Bueno / Bueno / Regular / Insuficiente
  periods_per_year: 1               # Un solo periodo anual
  passing_grade: 7.0                # Nota minima para aprobar (CA-04)
  attendance_min_percentage: 80.0   # Minimo 80% de asistencia requerido (CA-03)
  max_enrollments_per_period: 8     # Maximo 8 materias por periodo (CA-05)
  grading_max_value: 10             # Escala sobre 10

database:
  path: "products/colegio-basico/colegio_basico.db"

