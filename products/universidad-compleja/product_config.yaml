# products/universidad-compleja/product_config.yaml
#
# Producto derivado: Universidad Compleja Demo
# Derivado de la Linea de Productos Academica sin modificar el Core.

metadata:
  product_name: "Universidad Compleja Demo"
  product_type: "higher_education"

features:
  attendance: false     # En educacion superior no siempre se controla asistencia
  grading: true         # Calificaciones con escala numerica
  enrollment: true      # Inscripcion por creditos — central en universidad
  schedule: true        # Universidad maneja horarios por aula y salon
  reports: true         # Reportes academicos formales requeridos
  certificates: true    # Emite certificados de aprobacion y actas

academic_settings:
  evaluation_scale: "numeric"       # Escala numerica 0-10
  periods_per_year: 2               # Semestres A y B
  passing_grade: 6.0                # Universidad aprueba con 6/10 (mas permisivo que colegio)
  attendance_min_percentage: 75.0   # 75% minimo (menos estricto que colegio)
  max_enrollments_per_period: 6     # Maximo 6 materias por semestre (creditos)
  grading_max_value: 10             # Escala sobre 10

database:
  path: "products/universidad-compleja/universidad_compleja.db"
