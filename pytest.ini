[pytest]
# Le indica a pytest que añada la raíz del proyecto al sys.path
# Esto permite que los imports como "from core_assets..." funcionen
# tanto en local como en el runner de GitHub Actions.
pythonpath = .

# Directorio donde están los tests
testpaths = tests_core

# Mostrar salida detallada por defecto
addopts = -v --tb=short
